
name: React CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # Download your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install packages
      - name: Install Dependencies
        run: npm install

      # Run React tests
      - name: Run Tests
        run: npm test -- --run

      # Create production build
      - name: Build React App
        run: npm run build
